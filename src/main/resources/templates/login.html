<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LOGIN</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

    <h1>TOEIC VOCA</h1>

    <h2>LOGIN</h2>

    <form action="/login" method="post">

        <input class="input-box" type="text" name="username" placeholder="아이디">

        <input class="input-box" type="password" name="password" placeholder="비밀번호">

        <button class="btn" type="submit">로그인</button>

    </form>

    <p class="error-message" th:if="${error}" th:text="${error}"></p>

    <a class="link-text" href="/signup">아직 계정이 없나요? 회원가입</a>

</div>

</body>
</html>
