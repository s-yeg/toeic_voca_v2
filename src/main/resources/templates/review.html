<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>REVIEW</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

    <h1>REVIEW</h1>

    <div class="top-buttons">
        <a class="btn" href="/">HOME</a>
        <a class="btn" href="/day?type=review">DAY</a>
        <a class="btn" href="/review/clear">오답노트 비우기</a>
    </div>

    <div th:if="${selectedDay == null}">
        <h2 class="message">DAY를 선택해 주세요.</h2>
    </div>

    <div th:if="${selectedDay != null}">
        <h2 th:text="'DAY ' + ${selectedDay} + ' 오답노트'"></h2>

        <ul>
            <li th:each="wrongWord : ${wrongWords}">
                <span th:text="${wrongWord.word}"></span>
                -
                <span th:text="${wrongWord.meaning}"></span>
            </li>
        </ul>
    </div>

</div>

</body>
</html>
